<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1 class="auth-title">Bentornato</h1>
      <p class="auth-subtitle">Accedi al tuo account HackHub</p>
    </div>

    <form class="auth-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()" autocomplete="on">
      <div class="form-group">
        <label for="email" class="form-label">Email</label>
        <input 
          id="email"
          type="email" 
          class="form-control" 
          formControlName="email"
          placeholder="Inserisci la tua email"
          autocomplete="email"
          [class.is-invalid]="submitted && f['email'].errors"
        >
        <div class="invalid-feedback" *ngIf="submitted && f['email'].errors">
          <span *ngIf="f['email'].errors['required']">L'email è obbligatoria</span>
          <span *ngIf="f['email'].errors['email']">Inserisci un'email valida</span>
        </div>
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input 
          id="password"
          type="password" 
          class="form-control" 
          formControlName="password"
          placeholder="Inserisci la tua password"
          autocomplete="current-password"
          [class.is-invalid]="submitted && f['password'].errors"
        >
        <div class="invalid-feedback" *ngIf="submitted && f['password'].errors">
          <span *ngIf="f['password'].errors['required']">La password è obbligatoria</span>
          <span *ngIf="f['password'].errors['minlength']">La password deve avere almeno 6 caratteri</span>
        </div>
      </div>

      <div class="form-options">
        <label class="checkbox-label">
          <input type="checkbox" formControlName="rememberMe">
          <span class="checkmark"></span>
          Ricordami
        </label>
      </div>

      <div class="alert alert-error" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="isLoading || loginForm.invalid">
        <span *ngIf="!isLoading">Accedi</span>
        <div class="spinner" *ngIf="isLoading"></div>
      </button>
    </form>

    <div class="auth-footer">
      <p>Non hai un account? <a routerLink="../register" class="auth-link">Registrati</a></p>
    </div>
  </div>
</div>
