version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: hackhub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hackhub
      POSTGRES_USER: hackhub
      POSTGRES_PASSWORD: hackhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hackhub-network

volumes:
  postgres_data:

networks:
  hackhub-network:
    driver: bridge
