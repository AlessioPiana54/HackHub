version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: hackhub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hackhub
      POSTGRES_USER: hackhub
      POSTGRES_PASSWORD: hackhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hackhub-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hackhub"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Codice/app
      dockerfile: Dockerfile
    container_name: hackhub-backend
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/hackhub
      DB_USERNAME: hackhub
      DB_PASSWORD: hackhub
      JWT_SECRET: ${JWT_SECRET:-hackhub-dev-secret-key-min-32-chars!!}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hackhub-network

  frontend:
    build:
      context: ./Codice/frontend
      dockerfile: Dockerfile
    container_name: hackhub-frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - hackhub-network

volumes:
  postgres_data:

networks:
  hackhub-network:
    driver: bridge
