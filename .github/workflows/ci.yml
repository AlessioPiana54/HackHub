name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────
  # CI - Backend: Build e Test
  # ─────────────────────────────────────
  backend-ci:
    name: Backend - Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Codice/app
    steps:
      - name: Checkout codice
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build e Test con Maven
        run: ./mvnw clean verify

  # ─────────────────────────────────────
  # CI - Frontend: Build
  # ─────────────────────────────────────
  frontend-ci:
    name: Frontend - Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Codice/frontend
    steps:
      - name: Checkout codice
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Codice/frontend/package-lock.json

      - name: Installa dipendenze
        run: npm ci

      - name: Build produzione
        run: npm run build -- --configuration production

  # ─────────────────────────────────────
  # CD - Docker Build & Push
  # Solo su push a main, solo se CI passa
  # ─────────────────────────────────────
  docker-publish:
    name: Docker - Build & Push Images
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout codice
        uses: actions/checkout@v4

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e Push immagine Backend
        uses: docker/build-push-action@v5
        with:
          context: ./Codice/app
          dockerfile: ./Codice/app/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/backend:latest

      - name: Build e Push immagine Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./Codice/frontend
          dockerfile: ./Codice/frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:latest
